name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        shell: bash
        run: npx tsc -b && npx vite build

      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Verify output files
        id: verify
        shell: bash
        run: |
          echo "=== release/ contents ==="
          find release/ -maxdepth 3 -type f 2>/dev/null | sort || echo "(none)"
          # check for mac or windows output
          if find release/ -maxdepth 1 -name "*.dmg" -o -name "*.exe" 2>/dev/null | grep -q .; then
            echo "has_output=true" >> $GITHUB_OUTPUT
            echo "Output files found!"
          else
            echo "has_output=false" >> $GITHUB_OUTPUT
            echo "ERROR: No .dmg or .exe found"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: find release/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
