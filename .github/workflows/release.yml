name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Linux 需要的系统依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotify4 libxtst6 libnss3 libgbm1 libasound2t64

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        shell: bash
        run: npx tsc -b && npx vite build

      # electron-builder 可能返回非零退出码（warnings），用 || true 忽略
      # 然后通过检查产物文件来判断是否真正成功
      - name: Package with electron-builder
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --publish never || true

      - name: Verify output files
        id: verify
        shell: bash
        run: |
          echo "=== release/ contents ==="
          find release/ -maxdepth 2 -type f 2>/dev/null | sort || echo "(none)"

          HAS_OUTPUT=false
          case "${{ matrix.platform }}" in
            mac)
              find release/ -maxdepth 1 -name "*.dmg" 2>/dev/null | grep -q . && HAS_OUTPUT=true
              ;;
            win)
              find release/ -maxdepth 1 -name "*.exe" 2>/dev/null | grep -q . && HAS_OUTPUT=true
              ;;
            linux)
              find release/ -maxdepth 1 \( -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | grep -q . && HAS_OUTPUT=true
              ;;
          esac

          if [ "$HAS_OUTPUT" = "true" ]; then
            echo "has_output=true" >> $GITHUB_OUTPUT
            echo "✅ Output files found for ${{ matrix.platform }}"
          else
            echo "has_output=false" >> $GITHUB_OUTPUT
            echo "❌ ERROR: No output files found for ${{ matrix.platform }}"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: find release/ -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
