name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        shell: bash
        run: npx tsc -b && npx vite build

      - name: Package with electron-builder
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} || true

      - name: List release output
        shell: bash
        run: ls -lh release/ || echo "No release output found"

      - name: Check release files exist
        id: check_files
        shell: bash
        run: |
          count=$(ls release/*.exe release/*.dmg release/*.AppImage 2>/dev/null | wc -l | tr -d ' ')
          echo "file_count=$count" >> $GITHUB_OUTPUT
          if [ "$count" -gt 0 ]; then
            echo "Release files found: $count"
            ls -lh release/*.exe release/*.dmg 2>/dev/null
          else
            echo "ERROR: No release files found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.blockmap
            release/*.yml
        if: steps.check_files.outputs.file_count > 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
