appId: com.taoge.vibeplayer
productName: VibePlayer
copyright: Copyright © 2026 taogejava

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraMetadata:
  main: dist-electron/main.js

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  uninstallDisplayName: VibePlayer
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VibePlayer
  oneClick: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: ${name}-${version}-portable.${ext}

mac:
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - universal

dmg:
  artifactName: ${name}-${version}-mac.${ext}

# publish is handled by GitHub Actions workflow, not electron-builder directly
